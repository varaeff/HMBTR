server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /env-config.js {
    add_header Cache-Control "no-store";
    try_files /env-config.js =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
