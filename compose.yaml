services:
  postgres:
    image: postgres:16.3-alpine
    container_name: hmbtr_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - hmbtr_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hmbtr_prod

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hmbtr_prod_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - hmbtr_prod_backend_logs:/app/logs
    expose:
      - "${BACKEND_PORT:-3000}"
    networks:
      - hmbtr_prod

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: hmbtr_prod_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - hmbtr_prod

volumes:
  hmbtr_prod_postgres_data:
  hmbtr_prod_backend_logs:

networks:
  hmbtr_prod:
    driver: bridge
